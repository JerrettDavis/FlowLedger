version: "3.9"

# Infrastructure-only compose file for local development without Aspire.
# For the full developer experience, use ./eng/scripts/run.ps1 (Aspire orchestration).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_only_change_in_prod}
      POSTGRES_DB: flowledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
