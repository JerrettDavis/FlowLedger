name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore
        continue-on-error: true   # Advisory in M0; enforced from M1 onward

      - name: Build (treat warnings as errors)
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./artifacts/tests
          -- xunit.parallelizeAssembly=true

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: xUnit Test Results
          path: artifacts/tests/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: artifacts/tests/**/coverage.cobertura.xml
          if-no-files-found: ignore
