name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Build (treat warnings as errors)
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test --no-build --configuration Release
          --filter "Category!=E2E"
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./artifacts/tests
          -- xunit.parallelizeAssembly=true

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: xUnit Test Results
          path: artifacts/tests/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: artifacts/tests/**/coverage.cobertura.xml
          if-no-files-found: ignore
