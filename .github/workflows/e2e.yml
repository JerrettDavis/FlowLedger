name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build solution (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Start full stack
        run: docker compose --profile full up --build -d
        env:
          POSTGRES_PASSWORD: ci_test_password
          API__KEY: ci-test-api-key-not-for-production

      - name: Wait for API health
        run: |
          echo "Waiting for API /alive..."
          timeout 120 bash -c 'until curl -sf http://localhost:5001/alive > /dev/null; do echo "  still waiting..."; sleep 3; done'
          echo "API healthy."

      - name: Wait for Web health
        run: |
          echo "Waiting for Web UI..."
          timeout 90 bash -c 'until curl -sf http://localhost:5002/ > /dev/null; do echo "  still waiting..."; sleep 3; done'
          echo "Web healthy."

      - name: Install Playwright browsers (Chromium only)
        run: |
          # Build puts playwright.ps1 next to the test dll
          pwsh tests/FlowLedger.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests (headless, CI-only)
        run: >
          dotnet test tests/FlowLedger.E2E.Tests
          --no-build
          --configuration Release
          --filter "Category=E2E"
          --logger "trx;LogFileName=e2e-results.trx"
          --results-directory ./artifacts/tests
        env:
          E2E_BASE_URL: http://localhost:5002

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: E2E Test Results
          path: artifacts/tests/**/*.trx
          reporter: dotnet-trx

      - name: Upload Playwright traces / screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results/
          if-no-files-found: ignore

      - name: Show compose logs on failure
        if: failure()
        run: docker compose --profile full logs --tail=100

      - name: Tear down stack
        if: always()
        run: docker compose --profile full down -v
